<button id="zoomBtn">Zoom to Model</button>
<div id="mesh-viewer"></div>

<link href="https://cesium.com/downloads/cesiumjs/releases/1.130/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<script src="https://cesium.com/downloads/cesiumjs/releases/1.130/Build/Cesium/Cesium.js"></script>

<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
  }

  #zoomBtn {
    position: absolute;
    top: 10px;
    left: 50px;
    z-index: 1000;
    padding: 8px 12px;
  }

  #mesh-viewer {
    width: 100%;
    height: 650px;
  }
</style>

<script>
  Cesium.Ion.defaultAccessToken = "YOUR_TOKEN_HERE";

  let currentTileset = null;

  const viewer = new Cesium.Viewer("mesh-viewer", {
    timeline: false,
    animation: false,
    geocoder: false,
    sceneModePicker: false,
    baseLayerPicker: false,
    terrainProvider: new Cesium.EllipsoidTerrainProvider()
  });

  viewer.scene.globe.depthTestAgainstTerrain = false;

  async function addTileset(url) {
    try {
      currentTileset = await Cesium.Cesium3DTileset.fromUrl(url, {
        maximumScreenSpaceError: 1,
        skipLevelOfDetail: true
      });

      viewer.scene.primitives.add(currentTileset);

      await viewer.zoomTo(
        currentTileset,
        new Cesium.HeadingPitchRange(
          0,
          -0.5,
          currentTileset.boundingSphere.radius * 2
        )
      );

      console.log("Tileset loaded successfully");

    } catch (error) {
      console.error("Tileset failed:", error);
    }
  }

  // Zoom button
  document.getElementById("zoomBtn").addEventListener("click", () => {
    if (currentTileset) {
      viewer.zoomTo(
        currentTileset,
        new Cesium.HeadingPitchRange(
          0,
          -0.5,
          currentTileset.boundingSphere.radius * 2
        )
      );
    }
  });

  // Override Cesium Home button
  viewer.homeButton.viewModel.command.beforeExecute.addEventListener(function (e) {
    if (currentTileset) {
      e.cancel = true;

      viewer.zoomTo(
        currentTileset,
        new Cesium.HeadingPitchRange(
          0,
          -0.5,
          currentTileset.boundingSphere.radius * 2
        )
      );
    }
  });

  addTileset("https://github.com/aerialsurveysnz/3D_Viewer_Website/blob/4e37132b213d08e3e8e42aa169680b5d38cdf193/Gisborne_Farm/tileset.json");
</script>
